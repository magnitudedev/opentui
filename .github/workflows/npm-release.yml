name: NPM Snapshot Release

on:
  push:
    tags:
      - "*snapshot*"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_VERSION: 26.3.0

jobs:
  release:
    runs-on: blacksmith-12vcpu-macos-15

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
          use-cache: false

      - name: Restore Zig cache
        uses: actions/cache@v5
        with:
          path: .zig-cache
          key: zig-v1-${{ runner.os }}-0.15.2-${{ github.run_id }}-${{ github.job }}
          restore-keys: zig-v1-${{ runner.os }}-0.15.2-

      - name: Generate snapshot version
        id: version_scheme
        run: |
          COMMIT_SHA=$(git rev-parse --short=8 HEAD)

          # Pre-release snapshot
          VERSION="0.0.0-$(date +%Y%m%d)-${COMMIT_SHA}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Using snapshot version: $VERSION"

      - name: Install dependencies
        run: bun i

      - name: Prepare release versions
        run: bun run prepare-release "${{ steps.version_scheme.outputs.version }}"

      - name: Build packages (cross-compile for all platforms)
        run: |
          cd packages/core
          bun run build:native --all
          bun run build:lib
          cd ../qrcode && bun run build
          cd ../three && bun run build
          cd ../solid && bun run build
          cd ../react && bun run build
          cd ../keymap && bun run build
          cd ../ssh && bun run build

      - name: Run packed Node smoke tests
        run: |
          cd packages/core
          bun run test:dist --skip-build
          cd ../solid
          bun run test:dist --skip-build
          cd ../keymap
          bun run test:dist --skip-build
          cd ../ssh
          bun run test:dist --skip-build

      - name: Publish packages
        run: bun run publish
        env:
          NPM_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          CI: true
