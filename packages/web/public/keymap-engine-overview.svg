<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 880" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="layerGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2b3444"/>
      <stop offset="100%" stop-color="#222b39"/>
    </linearGradient>
    <linearGradient id="registerGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#21424b"/>
      <stop offset="100%" stop-color="#1a343c"/>
    </linearGradient>
    <linearGradient id="dispatchGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4b3428"/>
      <stop offset="100%" stop-color="#3d2a20"/>
    </linearGradient>
    <linearGradient id="queryGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#294135"/>
      <stop offset="100%" stop-color="#21352b"/>
    </linearGradient>
    <linearGradient id="addonGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4a2f36"/>
      <stop offset="100%" stop-color="#3c262c"/>
    </linearGradient>
    <linearGradient id="hostGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2f3946"/>
      <stop offset="100%" stop-color="#27303c"/>
    </linearGradient>
    <linearGradient id="stateGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#35414d"/>
      <stop offset="100%" stop-color="#2a3440"/>
    </linearGradient>
    <linearGradient id="appGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22404d"/>
      <stop offset="100%" stop-color="#1c3440"/>
    </linearGradient>

    <marker id="arrowCyan" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 L2,3 Z" fill="#5f8991"/>
    </marker>
    <marker id="arrowAmber" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 L2,3 Z" fill="#9a765b"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 L2,3 Z" fill="#6a866d"/>
    </marker>
    <marker id="arrowPink" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 L2,3 Z" fill="#8a6f78"/>
    </marker>
    <marker id="arrowIndigo" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 L2,3 Z" fill="#708090"/>
    </marker>
    <marker id="arrowHost" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 L2,3 Z" fill="#64748b"/>
    </marker>
    <marker id="arrowApp" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 L2,3 Z" fill="#5f8395"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="260" y="36" text-anchor="middle" fill="#b8c2cf" font-size="18" font-weight="700" letter-spacing="0.5">Keymap Engine</text>
  <text x="260" y="52" text-anchor="middle" fill="#7f8b99" font-size="10" letter-spacing="1">CONCEPT OVERVIEW</text>


  <!-- ================================================================== -->
  <!-- ROW 0: HOST (full width, at the top) -->
  <!-- ================================================================== -->

  <!-- HOST: x=24 w=472 y=76 h=82 -->
  <rect x="24" y="76" width="472" height="82" rx="10" fill="#0f1720" fill-opacity="0.82" stroke="#7e8ea0" stroke-width="1"/>
  <path d="M34,76 L486,76 A10,10 0 0,1 496,86 L496,104 L24,104 L24,86 A10,10 0 0,1 34,76 Z" fill="url(#hostGrad)" opacity="0.95"/>
  <!-- Icon: terminal. Band center=90. Icon 14x10 center=5. ty=90-5=85 -->
  <g transform="translate(40, 85)">
    <rect x="0" y="0" width="14" height="10" rx="2" fill="none" stroke="#8ea0b4" stroke-width="1.2"/>
    <line x1="0" y1="3" x2="14" y2="3" stroke="#8ea0b4" stroke-width="1" opacity="0.4"/>
  </g>
  <!-- Title baseline=94 -->
  <text x="60" y="94" fill="#b6c4d4" font-size="11" font-weight="700" letter-spacing="0.5">HOST</text>
  <text x="488" y="93" fill="#6f8296" font-size="7.5" font-style="italic" text-anchor="end">OpenTUI | HTML | Custom</text>
  <text x="38" y="118" fill="#d2dae4" font-size="9">The host adapter supplies targets, focus state, key events and lifecycle</text>
  <text x="38" y="130" fill="#d2dae4" font-size="9">management. It bridges the engine to a specific runtime environment.</text>
  <text x="38" y="147" fill="#7f8fa1" font-size="7.5" font-style="italic">KeymapHost: rootTarget, getFocusedTarget(), onKeyPress(), onFocusChange()</text>



  <!-- ================================================================== -->
  <!-- ROW 1: REGISTER (left) + DISPATCH (right) -->
  <!-- ================================================================== -->

  <!-- REGISTER: x=24 w=228 y=174 h=118 -->
  <rect x="24" y="174" width="228" height="118" rx="10" fill="#111a1d" fill-opacity="0.84" stroke="#58a6b4" stroke-width="1"/>
  <path d="M34,174 L242,174 A10,10 0 0,1 252,184 L252,202 L24,202 L24,184 A10,10 0 0,1 34,174 Z" fill="url(#registerGrad)" opacity="0.95"/>
  <!-- Icon: plus-circle. Band center=188. Icon center=7. ty=188-7=181 -->
  <g transform="translate(40, 181)">
    <circle cx="7" cy="7" r="6" fill="none" stroke="#58a6b4" stroke-width="1.2"/>
    <line x1="7" y1="4" x2="7" y2="10" stroke="#58a6b4" stroke-width="1.2"/>
    <line x1="4" y1="7" x2="10" y2="7" stroke="#58a6b4" stroke-width="1.2"/>
  </g>
  <!-- Title baseline=192 -->
  <text x="60" y="192" fill="#82c2cf" font-size="11" font-weight="700" letter-spacing="0.5">REGISTER</text>
  <text x="38" y="216" fill="#d2dae4" font-size="9">Layers, tokens and addons shape the compiled</text>
  <text x="38" y="228" fill="#d2dae4" font-size="9">model. Binding strings like "ctrl+x" or "dd"</text>
  <text x="38" y="240" fill="#d2dae4" font-size="9">are expanded, parsed and compiled into</text>
  <text x="38" y="252" fill="#d2dae4" font-size="9">sequence trees with fields and matchers.</text>
  <text x="38" y="264" fill="#d2dae4" font-size="9">Environment changes recompile layers.</text>
  <text x="38" y="281" fill="#89a6b8" font-size="7.5" font-style="italic">registerLayer() registerToken() register*Fields()</text>

  <!-- Compile arrow upper segment: behind addons box -->
  <path d="M138,292 L138,440" fill="none" stroke="#58a6b4" stroke-width="1.3" opacity="0.45"/>

  <!-- ADDONS: x=24 w=228 y=306 h=130 -->
  <rect x="24" y="306" width="228" height="130" rx="10" fill="#1b1316" fill-opacity="0.84" stroke="#bc7386" stroke-width="1"/>
  <path d="M34,306 L242,306 A10,10 0 0,1 252,316 L252,334 L24,334 L24,316 A10,10 0 0,1 34,306 Z" fill="url(#addonGrad)" opacity="0.95"/>
  <!-- Icon: plug. Band center=320. Icon 0..14 center=7. ty=320-7=313 -->
  <g transform="translate(40, 313)">
    <rect x="0" y="4" width="14" height="10" rx="3" fill="none" stroke="#bc7386" stroke-width="1.2"/>
    <line x1="4" y1="0" x2="4" y2="5" stroke="#bc7386" stroke-width="1.2"/>
    <line x1="10" y1="0" x2="10" y2="5" stroke="#bc7386" stroke-width="1.2"/>
  </g>
  <!-- Title baseline=324 -->
  <text x="60" y="324" fill="#d193a2" font-size="11" font-weight="700" letter-spacing="0.5">ADDONS</text>
  <text x="38" y="348" fill="#d2dae4" font-size="9">Extend the engine through public registration</text>
  <text x="38" y="360" fill="#d2dae4" font-size="9">APIs. Add binding parsers, field compilers,</text>
  <text x="38" y="372" fill="#d2dae4" font-size="9">command resolvers, tokens, intercepts and</text>
  <text x="38" y="384" fill="#d2dae4" font-size="9">layer analyzers. Every addon returns a</text>
  <text x="38" y="396" fill="#d2dae4" font-size="9">disposer. Ships leader, emacs, aliases,</text>
  <text x="38" y="408" fill="#d2dae4" font-size="9">ex-commands and more.</text>
  <text x="38" y="425" fill="#a88a96" font-size="7.5" font-style="italic">append*Parser() register*Fields() registerToken()</text>


  <!-- DISPATCH: x=268 w=228 y=174 h=262 -->
  <rect x="268" y="174" width="228" height="262" rx="10" fill="#1d1611" fill-opacity="0.84" stroke="#d18b63" stroke-width="1"/>
  <path d="M278,174 L486,174 A10,10 0 0,1 496,184 L496,202 L268,202 L268,184 A10,10 0 0,1 278,174 Z" fill="url(#dispatchGrad)" opacity="0.95"/>
  <!-- Icon: diamond. Band center=188. Diamond 14x14 center=7. ty=188-7=181 -->
  <g transform="translate(284, 181)">
    <polygon points="0,7 7,0 14,7 7,14" fill="#d18b63" opacity="0.85"/>
  </g>
  <!-- Title baseline=192 -->
  <text x="304" y="192" fill="#ebb08a" font-size="11" font-weight="700" letter-spacing="0.5">DISPATCH</text>

  <!-- Arrow from Host to Key Input badge -->
  <path d="M382,158 L382,210" fill="none" stroke="#7e8ea0" stroke-width="1.2" marker-end="url(#arrowHost)" opacity="0.45"/>

  <!-- Key Input badge -->
  <rect x="282" y="212" width="200" height="24" rx="6" fill="#15202a" fill-opacity="0.85" stroke="#7e8ea0" stroke-width="0.8"/>
  <!-- Keycap icon. Badge center=224. Icon 10x10 center=5. ty=224-5=219 -->
  <g transform="translate(290, 219)">
    <rect x="0" y="0" width="10" height="10" rx="2" fill="none" stroke="#8ea0b4" stroke-width="1.2"/>
    <text x="5" y="8" text-anchor="middle" fill="#8ea0b4" font-size="6.5" font-weight="700">A</text>
  </g>
  <!-- Text baseline=227 (224+3) -->
  <text x="306" y="227" fill="#d8e0e9" font-size="9.5" font-weight="600">Key Input from Host</text>

  <!-- Pipeline steps (each h=22, center=rectY+11, baseline=center+3) -->
  <rect x="282" y="246" width="200" height="22" rx="5" fill="#261d17" fill-opacity="0.88" stroke="#b57a58" stroke-width="0.6" opacity="1"/>
  <text x="291" y="260" fill="#d18b63" font-size="8.5" font-weight="600">1</text>
  <text x="303" y="260" fill="#d2dae4" font-size="8.5">Intercepts run (key / raw)</text>

  <rect x="282" y="273" width="200" height="22" rx="5" fill="#261d17" fill-opacity="0.88" stroke="#b57a58" stroke-width="0.6" opacity="1"/>
  <text x="291" y="287" fill="#d18b63" font-size="8.5" font-weight="600">2</text>
  <text x="303" y="287" fill="#d2dae4" font-size="8.5">Resolve event match keys</text>

  <rect x="282" y="300" width="200" height="22" rx="5" fill="#261d17" fill-opacity="0.88" stroke="#b57a58" stroke-width="0.6" opacity="1"/>
  <text x="291" y="314" fill="#d18b63" font-size="8.5" font-weight="600">3</text>
  <text x="303" y="314" fill="#d2dae4" font-size="8.5">Walk layers + sequence tree</text>

  <rect x="282" y="327" width="200" height="22" rx="5" fill="#261d17" fill-opacity="0.88" stroke="#b57a58" stroke-width="0.6" opacity="1"/>
  <text x="291" y="341" fill="#d18b63" font-size="8.5" font-weight="600">4</text>
  <text x="303" y="341" fill="#d2dae4" font-size="8.5">Disambiguate exact vs prefix</text>

  <rect x="282" y="354" width="200" height="22" rx="5" fill="#261d17" fill-opacity="0.88" stroke="#b57a58" stroke-width="0.6" opacity="1"/>
  <text x="291" y="368" fill="#d18b63" font-size="8.5" font-weight="600">5</text>
  <text x="303" y="368" fill="#d2dae4" font-size="8.5">Resolve command chain</text>

  <rect x="282" y="384" width="200" height="36" rx="6" fill="#18252d" fill-opacity="0.9" stroke="#5a9ab6" stroke-width="0.8" opacity="1"/>
  <!-- Step 6: center=402, fs=10, baseline=406. Number icon center=5, ty=402-5=397 -->
  <text x="291" y="406" fill="#7ec0da" font-size="10" font-weight="700">6</text>
  <text x="305" y="406" fill="#e0e8f0" font-size="10" font-weight="700">Execute command in app space</text>

  <!-- Arrow from Execute Command (step 6) to App/UI. Drawn here so Layers/Events paint over it, visible in gaps. -->
  <path d="M460,420 L460,834" fill="none" stroke="#5a9ab6" stroke-width="1.2" marker-end="url(#arrowApp)" opacity="0.3"/>


  <!-- ================================================================== -->
  <!-- ROW 2: LAYERS (full width) -->
  <!-- ================================================================== -->

  <!-- Arrows from row 1 into layers -->
  <path d="M138,440 L138,468" fill="none" stroke="#58a6b4" stroke-width="1.3" marker-end="url(#arrowCyan)" opacity="0.45"/>
  <path d="M105,436 L105,468" fill="none" stroke="#bc7386" stroke-width="1.3" marker-end="url(#arrowPink)" opacity="0.45"/>
  <path d="M382,436 L382,468" fill="none" stroke="#d18b63" stroke-width="1.3" marker-end="url(#arrowAmber)" opacity="0.45"/>

  <!-- LAYERS: x=24 w=472 y=470 h=162 -->
  <rect x="24" y="470" width="472" height="162" rx="10" fill="#111722" fill-opacity="0.84" stroke="#7a93ac" stroke-width="1"/>
  <path d="M34,470 L486,470 A10,10 0 0,1 496,480 L496,498 L24,498 L24,480 A10,10 0 0,1 34,470 Z" fill="url(#layerGrad)" opacity="0.95"/>
  <!-- Icon: three bars. Band center=484. Icon local 2..13.5 center=7.75. ty=484-7.75=476 -->
  <g transform="translate(40, 476)">
    <rect x="0" y="2" width="12" height="2.5" rx="1.2" fill="#8da6bf" opacity="0.5"/>
    <rect x="0" y="6.5" width="12" height="2.5" rx="1.2" fill="#8da6bf" opacity="0.7"/>
    <rect x="0" y="11" width="12" height="2.5" rx="1.2" fill="#8da6bf" opacity="0.9"/>
  </g>
  <!-- Title baseline=488 -->
  <text x="60" y="488" fill="#bad0e6" font-size="11" font-weight="700" letter-spacing="0.5">LAYERS</text>

  <!-- Bindings sub-box -->
  <rect x="38" y="506" width="216" height="40" rx="8" fill="#18202d" fill-opacity="0.9" stroke="#6481a0" stroke-width="1" opacity="1"/>
  <!-- Icon: diamond. Sub-box center at 526. Title baseline=522 center=518.15. Icon center=5. ty=518.15-5=513 -->
  <g transform="translate(48, 513)">
    <path d="M0,5 L5,0 L10,5 L5,10 Z" fill="#8da6bf" opacity="0.8"/>
  </g>
  <text x="64" y="522" fill="#bad0e6" font-size="11" font-weight="700" letter-spacing="0.5">BINDINGS</text>
  <text x="48" y="536" fill="#8da6bf" font-size="8">key + cmd + fields</text>

  <!-- Commands sub-box -->
  <rect x="268" y="506" width="216" height="40" rx="8" fill="#18202d" fill-opacity="0.9" stroke="#6481a0" stroke-width="1" opacity="1"/>
  <!-- Icon: hexagon. Same vertical as bindings -->
  <g transform="translate(278, 513)">
    <path d="M2,0 L8,0 L10,5 L8,10 L2,10 L0,5 Z" fill="#8da6bf" opacity="0.8"/>
  </g>
  <text x="294" y="522" fill="#bad0e6" font-size="11" font-weight="700" letter-spacing="0.5">COMMANDS</text>
  <text x="278" y="536" fill="#8da6bf" font-size="8">name + handler + fields</text>

  <!-- Layer description -->
  <text x="38" y="564" fill="#d2dae4" font-size="8.5">Each layer groups bindings and commands, optionally scoped to a target with a priority.</text>
  <text x="38" y="576" fill="#d2dae4" font-size="8.5">A binding maps a key or sequence like "ctrl+x" or "dd" to a named command or handler.</text>
  <text x="38" y="588" fill="#d2dae4" font-size="8.5">Layers are sorted by priority and activation. Focus, conditions, matchers, runtime data</text>
  <text x="38" y="600" fill="#d2dae4" font-size="8.5">and pending sequence state determine which layers and bindings are active.</text>
  <text x="38" y="621" fill="#8da6bf" font-size="7.5" font-style="italic">registerLayer({ target, priority, bindings, commands })</text>


  <!-- ================================================================== -->
  <!-- ROW 3: QUERY (left) + EVENTS (right) -->
  <!-- ================================================================== -->

  <!-- Arrows from layers down -->
  <path d="M138,632 L138,658" fill="none" stroke="#6cad7c" stroke-width="1.3" marker-end="url(#arrowGreen)" opacity="0.45"/>
  <path d="M382,632 L382,658" fill="none" stroke="#87a0b8" stroke-width="1.3" marker-end="url(#arrowIndigo)" opacity="0.45"/>

  <!-- QUERY: x=24 w=228 y=660 h=148 -->
  <rect x="24" y="660" width="228" height="148" rx="10" fill="#131a15" fill-opacity="0.84" stroke="#6cad7c" stroke-width="1"/>
  <path d="M34,660 L242,660 A10,10 0 0,1 252,670 L252,688 L24,688 L24,670 A10,10 0 0,1 34,660 Z" fill="url(#queryGrad)" opacity="0.95"/>
  <!-- Icon: magnifier. Band center=674. Circle center=6. ty=674-6=668 -->
  <g transform="translate(40, 668)">
    <circle cx="6" cy="6" r="5" fill="none" stroke="#6cad7c" stroke-width="1.2"/>
    <line x1="10" y1="10" x2="13" y2="13" stroke="#6cad7c" stroke-width="1.2"/>
  </g>
  <!-- Title baseline=678 -->
  <text x="60" y="678" fill="#9dd1aa" font-size="11" font-weight="700" letter-spacing="0.5">QUERY</text>
  <text x="38" y="702" fill="#d2dae4" font-size="9">Application code reads the current state.</text>
  <text x="38" y="714" fill="#d2dae4" font-size="9">Returns active keys, commands, pending</text>
  <text x="38" y="726" fill="#d2dae4" font-size="9">sequences and command entries. Results</text>
  <text x="38" y="738" fill="#d2dae4" font-size="9">are projected through current focus,</text>
  <text x="38" y="750" fill="#d2dae4" font-size="9">conditions, matchers and runtime data.</text>
  <text x="38" y="762" fill="#d2dae4" font-size="9">Commands can be run programmatically.</text>
  <text x="38" y="785" fill="#90b59b" font-size="7.5" font-style="italic">getActiveKeys() getCommands()</text>
  <text x="38" y="797" fill="#90b59b" font-size="7.5" font-style="italic">runCommand() getPendingSequence()</text>

  <!-- EVENTS: x=268 w=228 y=660 h=148 -->
  <rect x="268" y="660" width="228" height="148" rx="10" fill="#141922" fill-opacity="0.84" stroke="#87a0b8" stroke-width="1"/>
  <path d="M278,660 L486,660 A10,10 0 0,1 496,670 L496,688 L268,688 L268,670 A10,10 0 0,1 278,660 Z" fill="url(#stateGrad)" opacity="0.95"/>
  <!-- Icon: broadcast. Band center=674. Circles center=7. ty=674-7=667 -->
  <g transform="translate(284, 667)">
    <circle cx="7" cy="7" r="3" fill="#87a0b8"/>
    <circle cx="7" cy="7" r="6" fill="none" stroke="#87a0b8" stroke-width="1" opacity="0.4"/>
  </g>
  <!-- Title baseline=678 -->
  <text x="304" y="678" fill="#b5c8db" font-size="11" font-weight="700" letter-spacing="0.5">EVENTS</text>
  <text x="282" y="702" fill="#d2dae4" font-size="9">Batched derived-state signals and sync</text>
  <text x="282" y="714" fill="#d2dae4" font-size="9">sequence notifications. Framework</text>
  <text x="282" y="726" fill="#d2dae4" font-size="9">adapters subscribe to state changes</text>
  <text x="282" y="738" fill="#d2dae4" font-size="9">to trigger re-renders. Warnings and</text>
  <text x="282" y="750" fill="#d2dae4" font-size="9">errors surface validation issues during</text>
  <text x="282" y="762" fill="#d2dae4" font-size="9">registration or dispatch.</text>
  <text x="282" y="785" fill="#93a8bd" font-size="7.5" font-style="italic">on("state") on("pendingSequence")</text>
  <text x="282" y="797" fill="#93a8bd" font-size="7.5" font-style="italic">on("warning") on("error")</text>


  <!-- ================================================================== -->
  <!-- ROW 4: APP / UI -->
  <!-- ================================================================== -->

  <path d="M138,808 L138,834" fill="none" stroke="#6cad7c" stroke-width="1.2" marker-end="url(#arrowGreen)" opacity="0.45"/>
  <path d="M382,808 L382,834" fill="none" stroke="#87a0b8" stroke-width="1.2" marker-end="url(#arrowIndigo)" opacity="0.45"/>

  <!-- APP / UI: x=24 w=472 y=836 h=34 -->
  <rect x="24" y="836" width="472" height="34" rx="8" fill="#121b22" fill-opacity="0.84" stroke="#5a9ab6" stroke-width="1"/>
  <!-- Icon: checkmark. Box center=853. Text baseline=857 center=853.15. Icon 12x10 center=5. ty=853-5=848 -->
  <g transform="translate(226, 848)">
    <rect x="0" y="0" width="12" height="10" rx="2" fill="none" stroke="#7ec0da" stroke-width="1.2"/>
    <polyline points="3,5 5,8 10,3" fill="none" stroke="#7ec0da" stroke-width="1.2"/>
  </g>
  <!-- Title baseline=857 -->
  <text x="244" y="857" fill="#a9d0e2" font-size="11" font-weight="700" letter-spacing="0.5">APP / UI</text>

</svg>
